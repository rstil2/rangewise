services:
  - type: web
    name: rangewise
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LAUNCH_DATE
        value: 2026-07-04T12:00:00Z
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: VITE_APP_URL
        sync: false
